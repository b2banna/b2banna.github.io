    <style type="text/css">
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            font-size: 2em;
            color: #f9e0ec;
            margin: 0em;
            padding: 0em;
            overflow: hidden;
        }

        h1,
        h3 {
            text-align: center;
            margin: 0em;
        }

        div {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #FF5722;

            animation: bounce 0.5s;
            animation-direction: alternate;
            animation-timing-function: cubic-bezier(.5, 0.05, 1, .5);
            animation-iteration-count: infinite;
        }

        @keyframes bounce {
            from {
                transform: translate3d(0, 0, 0);
            }

            to {
                transform: translate3d(0, 200px, 0);
            }
        }

        /* Prefix Support */
        ball {
            -webkit-animation-name: bounce;
            -webkit-animation-duration: 0.5s;
            -webkit-animation-direction: alternate;
            -webkit-animation-timing-function: cubic-bezier(.5, 0.05, 1, .5);
            -webkit-animation-iteration-count: infinite;
        }

        @-webkit-keyframes bounce {
            from {
                -webkit-transform: translate3d(0, 0, 0);
                transform: translate3d(0, 0, 0);
            }

            to {
                -webkit-transform: translate3d(0, 200px, 0);
                transform: translate3d(0, 200px, 0);
            }
        }
    </style>

    <script type="text/javascript">
        const setbackground = () => {
            window.setTimeout("setbackground()", 3000);
            let index = Math.round(Math.random() * 9);
            switch (index) {
                case 1:
                    document.bgColor = '#755a35';
                    break;
                case 2:
                    document.bgColor = '#93a7a6';
                    break;
                case 3:
                    document.bgColor = '#755a35';
                    break;
                case 4:
                    document.bgColor = '#755a35';
                    break;
                case 5:
                    document.bgColor = '#6b724e';
                    break;
                case 6:
                    document.bgColor = '#5d61a2';
                    break;
                case 7:
                    document.bgColor = '#272523';
                    break;
                case 8:
                    document.bgColor = '#78383d';
                    break;
                case 9:
                    document.bgColor = '#7a1b38';
                    break;
                default:
                    document.bgColor = '#c82f63';
            }
        }
    </script>
</head>
